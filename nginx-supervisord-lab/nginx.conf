user www-data;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend {
        server 127.0.0.1:9000;
        server 127.0.0.1:9001;
    }

    server {
        listen 80;
        server_name localhost;

        return 301 https://$host:8443$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        # Certificate tự ký, chỉ dùng cho demo.
        ssl_certificate /etc/nginx/ssl/lab.crt;
        ssl_certificate_key /etc/nginx/ssl/lab.key;
        root /var/www/lab;
        index index.html;

        access_log /var/log/nginx/lab_access.log;
        error_log /var/log/nginx/lab_error.log warn;

        add_header X-Lab-Server "nginx-supervisord" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location /api/ {
            if ($request_method !~ ^(GET|POST|HEAD)$) {
                return 405;
            }

            proxy_pass http://backend/;
        }

        # Extra app chỉ hoạt động sau khi được add bằng Supervisord.
        location /extra/ {
            proxy_pass http://127.0.0.1:9100/;
        }

        location /downloads/ {
            alias /var/www/lab/downloads/;
            autoindex on;
            limit_except GET {
                deny all;
            }
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
