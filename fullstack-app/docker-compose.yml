version: '3.8'

services:
  # 1. Cơ sở dữ liệu: Redis
  redis_db:
    image: redis:7-alpine
    container_name: redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - app_network

  # 2. Backend: Node.js API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: backend:latest
    container_name: backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis_db
    networks:
      - app_network

  # 3. Frontend: Nginx Web tĩnh + Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend:latest
    container_name: frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./frontend/logs:/var/log/nginx
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  redis_data:

networks:
  app_network:
    driver: bridge
