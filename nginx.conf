# Cấu hình Upstream hoặc các thiết lập chung nằm ở ngữ cảnh http {...}
# Dưới đây là cấu hình cụ thể cho Server Block (Virtual Host) của bạn:

server {
    # 1. PORT LISTEN (Cấu hình cổng lắng nghe)
    # Lắng nghe cổng 80 (HTTP) để tự động chuyển hướng sang HTTPS bảo mật
    listen 80;
    server_name demo.local;
    return 301 https://$host$request_uri;
}

server {
    # Lắng nghe cổng 443 (HTTPS) với cấu hình HTTP/2 tối ưu
    listen 443 ssl;
    server_name demo.local;

    # Thư mục gốc chứa tài liệu/file
    root /var/www/demo;
    index index.html index.htm;

    # 2. CERT PATH (Đường dẫn chứng chỉ SSL/TLS)
    ssl_certificate     /etc/nginx/ssl/demo.crt; # Đường dẫn file Certificate (.crt hoặc .pem)
    ssl_certificate_key /etc/nginx/ssl/demo.key; # Đường dẫn file Private Key (.key)

    # Tối ưu hóa bảo mật SSL (Khuyên dùng)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 3. FILE LOG (Cấu hình ghi log riêng biệt cho dịch vụ này)
    # Log ghi lại lịch sử truy cập (Access log)
    access_log /var/log/nginx/demo_access.log;
    # Log ghi lại các lỗi phát sinh (Error log)
    error_log /var/log/nginx/demo_error.log warn;

    # 4. ADD HEADER (Thêm các HTTP Header tùy biến hoặc bảo mật)
    # Thêm Header tự định nghĩa để kiểm tra hoặc định danh phía Client
    add_header X-Server-Developer "Demo-Nginx" always;
    # Header bảo mật tránh clickjacking và bảo vệ loại MIME
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self';" always;

    # 5. ALLOW METHOD (Giới hạn các phương thức HTTP được phép sử dụng)
    # Chỉ cho phép GET, POST và HEAD. Chặn các method nguy hiểm như DELETE, PUT ở phạm vi toàn hệ thống
    if ($request_method !~ ^(GET|POST|HEAD)$ ) {
        return 405; # Trả về lỗi 405 Method Not Allowed
    }

    # Cấu hình thư mục chính
    location / {
        try_files $uri $uri/ =404;
    }

    # 6. EXPOSE FILE/DIRECTORY (Hiển thị/Liệt kê danh sách file và thư mục)
    # Ví dụ: Khi người dùng truy cập vào đường dẫn demo.local/downloads/
    location /downloads/ {
        alias /var/www/demo/downloads/; # Đường dẫn thư mục vật lý chứa file trên ổ cứng
        
        autoindex on;             # BẬT tính năng liệt kê danh sách file (Expose Directory)
        autoindex_exact_size off; # Hiển thị kích thước file dạng dễ đọc (ví dụ: KB, MB thay vì số byte chính xác)
        autoindex_localtime on;   # Hiển thị thời gian cập nhật file theo giờ cục bộ của Server
        
        # Bạn cũng có thể áp dụng riêng quy tắc ALLOW METHOD ở đây nếu muốn thư mục này CHỈ ĐƯỢC GET (tải xuống)
        limit_except GET {
            deny all;
        }
    }
}